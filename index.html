<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Jahnavi</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="glass-container" id="main-card">
        <h1 class="glitch" data-text="JAHNAVI">JAHNAVI</h1>
        <p class="subtitle">Experience the Celebration</p>
        
        <div class="interactive-zone">
            <p>Slide to initiate Birthday Sequence</p>
            <input type="range" min="0" max="100" value="0" class="slider" id="unlock-slider">
        </div>

        <div id="surprise-content" class="hidden">
            <h2 class="fade-in">HBD TO THE LEGEND! 🎂</h2>
            <div class="stats-grid">
                <div class="stat-box"><h3>Level</h3><p>Upgraded</p></div>
                <div class="stat-box"><h3>Status</h3><p>Elite</p></div>
            </div>
            <button class="action-btn" onclick="blast()">RE-RELEASE CONFETTI</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
