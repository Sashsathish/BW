<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LALITHA // PREMERE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: #000; color: #fff; font-family: 'Syncopate', sans-serif; overflow-x: hidden; }

        /* Custom Magnetic Cursor */
        .cursor {
            width: 10px; height: 10px; background: #fff; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 1000; mix-blend-mode: difference;
        }

        section { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 1px solid rgba(255,255,255,0.1); }

        /* Section 1: Hero */
        .hero h1 { font-size: 10vw; text-transform: uppercase; letter-spacing: -5px; }

        /* Section 2: Interactive Gallery */
        .gallery { background: #0a0a0a; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 50px; }
        .card { 
            height: 400px; background: #1a1a1a; border-radius: 10px; 
            overflow: hidden; position: relative; filter: grayscale(1); transition: 0.5s;
        }
        .card:hover { filter: grayscale(0); transform: scale(1.05); z-index: 10; }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        /* Section 3: The Terminal */
        .terminal { flex-direction: column; background: #000; }
        #typewriter { font-size: 2rem; color: #0f0; font-family: monospace; width: 60%; text-align: center; }

        .scroll-indicator { position: absolute; bottom: 20px; font-size: 0.7rem; opacity: 0.5; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
    </style>
</head>
<body>

    <div class="cursor"></div>

    <section class="hero">
        <h1 id="hero-name">LALITHA</h1>
        <div class="scroll-indicator">SCROLL IF YOU LOVE ME</div>
    </section>

    

    <section class="terminal">
        <div id="typewriter"></div>
    </section>

    <script>
        // Cursor Logic
        const cursor = document.querySelector('.cursor');
        window.addEventListener('mousemove', e => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.3 });
        });

        // Register ScrollTrigger
        gsap.registerPlugin(ScrollTrigger);

        // Section 1 Animations
        gsap.to("#hero-name", {
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                scrub: true
            },
            scale: 5,
            opacity: 0,
            filter: "blur(20px)"
        });

        // Section 2: Cards Floating Effect
        gsap.from(".card", {
            scrollTrigger: {
                trigger: ".gallery",
                start: "top center"
            },
            y: 100,
            opacity: 0,
            stagger: 0.2,
            duration: 1
        });

        // Section 3: Typewriter Effect
        const text = "My World : LALITHA detected. Status: Wife. Question: [Will You Marry Me]";
        let i = 0;
        
        ScrollTrigger.create({
            trigger: ".terminal",
            onEnter: () => {
                function typing() {
                    if (i < text.length) {
                        document.getElementById("typewriter").innerHTML += text.charAt(i);
                        i++;
                        setTimeout(typing, 50);
                    }
                }
                typing();
            }
        });
    </script>
</body>
</html>
