<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAHNAVI // 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --accent: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body { background: var(--bg); color: var(--accent); font-family: "Inter", sans-serif; overflow: hidden; }

        #canvas-container { position: fixed; top: 0; left: 0; z-index: 1; }

        .ui-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            pointer-events: none;
        }

        .hero-text {
            font-size: 12vw;
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }

        .cursor {
            width: 20px; height: 20px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        .nav-info {
            position: fixed;
            bottom: 40px;
            right: 40px;
            font-family: monospace;
            z-index: 100;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>
    <div id="canvas-container"></div>

    <main class="ui-layer">
        <div class="hero-text" id="name">Jahnavi</div>
        <div class="hero-text" style="color: transparent; -webkit-text-stroke: 1px #fff;">Twenty</div>
        <div class="hero-text">Six</div>
    </main>

    <div class="nav-info">COORD: <span id="coord">0,0</span></div>

    <script>
        // 1. THREE.JS 3D SCENE (The "Advanced" Part)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Create a morphing 3D Sphere
        const geometry = new THREE.IcosahedronGeometry(2, 20);
        const material = new THREE.MeshNormalMaterial({ wireframe: true });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);
        camera.position.z = 5;

        // 2. MOUSE TRACKING & INTERACTION
        const mouse = { x: 0, y: 0 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            // Move custom cursor
            gsap.to("#cursor", { x: e.clientX, y: e.clientY, duration: 0.5, ease: "power3.out" });
            document.getElementById('coord').innerText = `${e.clientX}, ${e.clientY}`;
        });

        // 3. ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.x += 0.005;
            sphere.rotation.y += 0.005;

            // Subtle reaction to mouse
            sphere.position.x = mouse.x * 0.5;
            sphere.position.y = mouse.y * 0.5;
            
            renderer.render(scene, camera);
        }
        animate();

        // 4. GSAP ENTRANCE
        gsap.from(".hero-text", {
            y: 200,
            opacity: 0,
            duration: 1.5,
            stagger: 0.2,
            ease: "expo.out"
        });
    </script>
</body>
</html>
